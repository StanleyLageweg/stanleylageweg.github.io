name: Build and deploy the PR preview site to GitHub Pages

on:
  pull_request:
    branches: ["master"]
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write
  pull-requests: write
  deployments: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  start-deployment:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.deployment.outputs.env }}
      deployment_id: ${{ steps.deployment.outputs.deployment_id }}
    steps:
      - name: Start GitHub Deployment
        id: deployment
        uses: bobheadxi/deployments@v1
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: pr-preview-${{ github.event.number }}
          ref: ${{ github.event.pull_request.head.sha }}
          desc: PR preview ${{ github.event.number }}
          transient: true
          logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build:
    needs: start-deployment
    uses: ./.github/workflows/build.yml
    with:
      baseurl: /pr-preview/pr-${{ github.event.number }}
      is_preview: true
      artifact_name: site-pr-${{ github.event.number }}

  deploy-preview:
    needs: [start-deployment, build]
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.preview.outputs.preview-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-pr-${{ github.event.number }}
          path: _site

      - name: Deploy preview
        id: preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy
          comment: false
          pages-base-url: ${{ github.repository_owner }}.github.io

  finish-deployment:
    needs: [start-deployment, build, deploy-preview]
    if: always() && needs.start-deployment.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Finish GitHub Deployment
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ (needs.build.result == 'success' && needs.deploy-preview.result == 'success') && 'success' || 'failure' }}
          env: ${{ needs.start-deployment.outputs.env }}
          deployment_id: ${{ needs.start-deployment.outputs.deployment_id }}
          env_url: ${{ needs.deploy-preview.outputs.preview_url }}
