name: Build the site and push it to the gh-pages branch

on:
  push:
    branches: ["master"]

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      artifact_name: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site
          path: _site

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean-exclude: pr-preview
          force: false
